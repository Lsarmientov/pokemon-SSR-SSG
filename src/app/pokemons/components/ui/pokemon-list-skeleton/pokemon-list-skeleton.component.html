<div class="grid gap-3 grid-cols-1 sm:grid-cols-3 md:grid-cols-5">
  @for (i of limit() | range; track $index) {
    <div
      class="bg-white h-44 bg-opacity-25 rounded-lg shadow-md flex flex-col justify-center items-center p-4 cursor-pointer animate-fadeIn"
    >
      <div class="rounded-full bg-gray-300 animate-pulse w-24 h-24"></div>
      <div class="flex text-center mt-5">
        <div class="h-4 w-20 bg-gray-300 rounded animate-pulse"></div>
      </div>
    </div>
  }
</div>
